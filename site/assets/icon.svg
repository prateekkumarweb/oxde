<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="OxDe icon">
  <title>OxDe</title>

  <g transform="translate(512,512) scale(0.75) translate(-512,-512)">
    <!-- 6 gear teeth -->
    <g fill="#ce422b">
      <rect x="452" y="70" width="120" height="110" rx="6" transform="rotate(0,512,512)" />
      <rect x="452" y="70" width="120" height="110" rx="6" transform="rotate(60,512,512)" />
      <rect x="452" y="70" width="120" height="110" rx="6" transform="rotate(120,512,512)" />
      <rect x="452" y="70" width="120" height="110" rx="6" transform="rotate(180,512,512)" />
      <rect x="452" y="70" width="120" height="110" rx="6" transform="rotate(240,512,512)" />
      <rect x="452" y="70" width="120" height="110" rx="6" transform="rotate(300,512,512)" />
    </g>

    <!-- gear ring (hole is the transparent center) -->
    <circle cx="512" cy="512" r="290" fill="none" stroke="#ce422b" stroke-width="150" />

    <!-- oxidation accent inside the hole -->
    <circle cx="512" cy="512" r="170" fill="none" stroke="#6fa88f" stroke-width="18" />
  </g>

  <!-- corner brackets, framing the gear -->
  <path d="M 40 190 V 40 H 190" stroke="#6fa88f" stroke-width="48" fill="none"
    stroke-linecap="square" />
  <path d="M 984 834 V 984 H 834" stroke="#6fa88f" stroke-width="48" fill="none"
    stroke-linecap="square" />

  <!-- oxidation spot on the bracket -->
  <circle cx="170" cy="170" r="34" fill="#ce422b" />
</svg>
